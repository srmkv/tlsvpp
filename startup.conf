unix {
  interactive
  cli-listen /tmp/vpp-cli.sock
  log /tmp/vpp.log
  exec /home/ngfw/vpp/start-cmd.vpp
}
api-trace { on }
socksvr {
  socket-name /run/vpp/api.sock
}
session {
  enable
  use-app-socket-api
}
memory {
  main-heap-size 2G
  default-hugepage-size 1G
}
 
cpu {
  main-core 0
  corelist-workers 1-2
}
 
 
logging {
  default-log-level info
  default-syslog-log-level info
}
plugins {
  plugin default { enable }
  plugin linux_cp_plugin.so { enable }
  plugin linux_nl_plugin.so { enable }
  plugin dpdk_plugin.so { enable }
  plugin tlsctrl_plugin.so { enable }
}
dpdk {
  dev 0000:02:05.0 {
    name eth0
    num-rx-queues 1
  }
  dev 0000:02:06.0 {
    name eth1
    num-rx-queues 1
  }
}
