unix {
  interactive
  cli-listen /tmp/vpp-cli.sock
  log /tmp/vpp.log
  exec /home/ngfw/vpp/start-cmd.vpp
}
api-trace { on }
socksvr {
  socket-name /run/vpp/api.sock
}
session {
  enable
  use-app-socket-api
}
memory {
  main-heap-size 512M
  default-hugepage-size 2M
}
 
cpu {
  main-core 0
  corelist-workers 1-3
}
 
 
logging {
  default-log-level debug
  default-syslog-log-level info
}
plugins {
  plugin default { enable }
  plugin dpdk_plugin.so { enable }
 plugin ping_plugin.so { enable }
  plugin arping_plugin.so { enable }
#  plugin linux_cp_plugin.so { enable }
#  plugin linux_nl_plugin.so { enable }
  plugin tlsctrl_plugin.so { enable }
}
dpdk {
  no-multi-seg
  no-tx-checksum-offload
  #socket-mem 131048,131048
  iova-mode pa
  dev 0000:02:05.0 {
    name eth0
    num-rx-queues 1
  }
  dev 0000:02:06.0 {
    name eth1
    num-rx-queues 1
  }
}
